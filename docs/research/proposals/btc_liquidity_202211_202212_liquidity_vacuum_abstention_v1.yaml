program_id: btc_liquidity_campaign
run_mode: research
objective_name: retail_profitability
promotion_profile: research
description: >
  Priority 4 bounded abstention run. Test whether LIQUIDITY_VACUUM should act as a
  tail-risk avoidance filter for BTCUSDT spot on 5m bars during November to December 2022.
symbols:
  - BTCUSDT
timeframe: 5m
start: "2022-11-01"
end: "2022-12-31"
instrument_classes:
  - crypto
trigger_space:
  allowed_trigger_types:
    - EVENT
  events:
    include:
      - LIQUIDITY_VACUUM
templates:
  - tail_risk_avoid
horizons_bars:
  - 12
directions:
  - long
entry_lags:
  - 1
search_control:
  max_hypotheses_total: 1
  max_hypotheses_per_template: 1
  max_hypotheses_per_event_family: 1
  random_seed: 42
