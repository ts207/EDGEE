program_id: btc_exhaustion_campaign
run_mode: research
objective_name: retail_profitability
promotion_profile: research
description: >
  Priority 5 bounded run. Test whether FORCED_FLOW_EXHAUSTION supports a
  long BTCUSDT spot exhaustion-reversal expression on 5m bars during November to December 2022.
symbols:
  - BTCUSDT
timeframe: 5m
start: "2022-11-01"
end: "2022-12-31"
instrument_classes:
  - crypto
trigger_space:
  allowed_trigger_types:
    - EVENT
  events:
    include:
      - FORCED_FLOW_EXHAUSTION
templates:
  - exhaustion_reversal
horizons_bars:
  - 12
directions:
  - long
entry_lags:
  - 1
search_control:
  max_hypotheses_total: 1
  max_hypotheses_per_template: 1
  max_hypotheses_per_event_family: 1
  random_seed: 42
