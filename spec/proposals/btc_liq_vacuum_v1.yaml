program_id: btc_obs_2021_2022_campaign
objective: retail_profitability
promotion_profile: disabled

description: >
  btc_liq_vacuum_v1: Liquidity vacuum momentum after cascade. When a liquidation
  cascade or deleveraging wave exhausts liquidity on one side, price enters a vacuum
  zone and momentum continues in the cascade direction. Tests whether the continuation
  template captures this post-cascade drift on the 2021-2022 BTC cycle.

symbols: [BTCUSDT]
start: 2021-01-01
end: 2022-12-31
timeframe: 5m

templates: [continuation]

trigger_space:
  allowed_trigger_types: [EVENT]
  events:
    include:
      - LIQUIDATION_CASCADE
      - DELEVERAGING_WAVE

horizons_bars: [6, 12, 24, 48]
directions: [long, short]
entry_lags: [1, 2]

search_control:
  max_hypotheses_total: 200
  max_hypotheses_per_template: 200
  max_hypotheses_per_event_family: 150
