program_id: btc_obs_2021_2022_campaign
objective: retail_profitability
promotion_profile: disabled

description: >
  Observation-only BTC 2021-2022 campaign focused strictly on false breakouts
  (continuation template failures) after initial diagnostics showed near-misses
  at 72b and 24b horizons.

symbols: [BTCUSDT]
start: 2021-01-01
end: 2022-12-31
timeframe: 5m

templates: [continuation]

trigger_space:
  allowed_trigger_types: [EVENT]
  events:
    include:
      - FALSE_BREAKOUT

horizons_bars: [24, 72]
directions: [long, short]
entry_lags: [1, 2]

search_control:
  max_hypotheses_total: 100
  max_hypotheses_per_template: 50
  max_hypotheses_per_event_family: 50
