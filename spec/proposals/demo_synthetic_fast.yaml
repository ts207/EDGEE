program_id: synthetic_demo_fast
objective: retail_profitability
description: >
  Fast synthetic proposal demo that exercises the proposal -> plan -> run_all path
  without requiring a populated historical data lake.
symbols: [BTCUSDT]
start: 2025-01-01
end: 2025-01-14
timeframe: 5m
templates: [continuation]
trigger_space:
  allowed_trigger_types: [EVENT]
  events:
    include: [VOL_SHOCK, RANGE_BREAKOUT, FALSE_BREAKOUT]
horizons_bars: [12, 24]
directions: [long, short]
entry_lags: [1]
discovery_profile: synthetic
phase2_gate_profile: synthetic
search_spec: synthetic_truth
config_overlays:
  - project/configs/golden_synthetic_discovery_fast.yaml
