# Packaged fast synthetic demo proposal.
# Keeps synthetic routing explicit via discovery_profile / phase2_gate_profile / search_spec
# and carries the golden fast overlay into the run_all command.

program_id: synthetic_demo_fast
objective_name: retail_profitability
promotion_profile: disabled
run_mode: research

description: >
  Fast synthetic proposal for detector and pipeline certification on a narrow
  slice. Uses the synthetic truth search surface and the golden fast discovery
  overlay so the demo can run without a historical data lake checkout.

symbols:
  - BTCUSDT

timeframe: 15m
start: "2026-01-01"
end: "2026-01-14"

trigger_space:
  allowed_trigger_types: [EVENT]
  events:
    include:
      - FND_DISLOC

templates:
  - continuation

horizons_bars:
  - 1

directions:
  - long
  - short

entry_lags:
  - 1

search_control:
  max_hypotheses_total: 64
  max_hypotheses_per_template: 64
  max_hypotheses_per_event_family: 64

discovery_profile: synthetic
phase2_gate_profile: synthetic
search_spec: synthetic_truth
config_overlays:
  - project/configs/golden_synthetic_discovery_fast.yaml
