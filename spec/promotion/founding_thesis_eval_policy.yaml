version: 1
kind: founding_thesis_eval_policy
schema_version: founding_thesis_eval_policy_v1
notes:
- Generate canonical evidence bundles directly from raw perp market data.
- "The first founding batch is intentionally narrow: five standalone event theses."
- Basis and funding dislocation bundles may use canonical feature-schema inputs when
  dedicated paired raw archives are absent.
- Liquidation cascade bundles may fall back to a feature-schema forced-flow proxy
  when liquidation and open-interest archives are unavailable in the founding batch.
- Confirmation and episode theses remain in the registry, but they are not part of
  the first empirical packaging batch.
founding_theses:
- candidate_id: THESIS_BASIS_DISLOC
  event_type: BASIS_DISLOC
  detector_kind: basis_disloc
  event_contract_ids:
  - BASIS_DISLOC
  symbols:
  - BTCUSDT
  horizons:
  - 8
  - 16
  - 24
  payoff_mode: absolute_return
  fees_bps: 6.0
  notes: Feature-schema basis dislocation evidence uses canonical basis_bps and basis_zscore
    columns when bootstrap raw spot/perp pairing is unavailable as a separate archive.
  params:
    z_threshold: 5.0
    lookback_window: 288
    cooldown_bars: 12
    min_basis_bps: 10.0
- candidate_id: THESIS_FND_DISLOC
  event_type: FND_DISLOC
  detector_kind: fnd_disloc
  event_contract_ids:
  - FND_DISLOC
  symbols:
  - BTCUSDT
  horizons:
  - 8
  - 16
  - 24
  payoff_mode: absolute_return
  fees_bps: 6.0
  notes: Feature-schema funding dislocation evidence uses canonical basis and funding
    columns from the cleaned feature lake.
  params:
    z_threshold: 3.75
    lookback_window: 288
    threshold_bps: 1.25
    funding_quantile: 0.9
    alignment_window: 5
    cooldown_bars: 12
    min_basis_bps: 5.0
- candidate_id: THESIS_VOL_SHOCK
  event_type: VOL_SHOCK
  detector_kind: vol_shock
  symbols:
  - BTCUSDT
  - ETHUSDT
  horizons:
  - 8
  - 16
  - 24
  payoff_mode: absolute_return
  fees_bps: 6.0
  notes: Raw-data evidence uses absolute post-shock move, which matches the contract's
    volatility-expansion semantics better than directional continuation.
  params:
    rv_window: 12
    baseline_window: 288
    shock_quantile: 0.95
- candidate_id: THESIS_LIQUIDITY_VACUUM
  event_type: LIQUIDITY_VACUUM
  detector_kind: liquidity_vacuum
  symbols:
  - BTCUSDT
  - ETHUSDT
  horizons:
  - 8
  - 16
  - 24
  payoff_mode: absolute_return
  fees_bps: 6.0
  notes: Raw-data evidence uses post-event absolute move after low-volume, wide-range
    continuation bars following the initiating shock.
  params:
    shock_quantile: 0.95
    shock_window: 288
    volume_window: 36
    vol_ratio_floor: 0.9
    range_multiplier: 1.1
    lookahead_bars: 3
    min_vacuum_bars: 1
- candidate_id: THESIS_LIQUIDATION_CASCADE
  event_type: LIQUIDATION_CASCADE
  detector_kind: liquidation_cascade
  symbols:
  - BTCUSDT
  - ETHUSDT
  horizons:
  - 8
  - 16
  - 24
  payoff_mode: absolute_return
  fees_bps: 6.0
  notes: Evidence prefers raw liquidation plus open-interest flow when available, and
    otherwise falls back to a feature-schema forced-flow proxy using return shock,
    funding stretch, depth depletion, and spread stress.
  params:
    shock_quantile: 0.97
    shock_window: 288
    oi_window: 12
    oi_drop_quantile: 0.05
    funding_window: 720
    funding_z: 1.5
    funding_quantile: 0.8
    depth_quantile: 0.8
    spread_quantile: 0.8
    cooldown_bars: 12
    min_funding_abs: 0.0005
    min_depth_depletion: 0.6
    min_spread_z: 3.0
