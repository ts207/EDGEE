version: 1
kind: seed_promotion_policy
schema_version: seed_promotion_policy_v1
lifecycle_classes:
  - candidate_thesis
  - tested_thesis
  - seed_promoted
  - paper_eligible
  - production_eligible
candidate_statuses:
  - test_now
  - needs_repair
  - needs_more_evidence
  - reject
  - ready_for_seed_packaging
minimum_requirements:
  governed_source_required: true
  clear_trigger_definition: true
  clear_expected_response: true
  bounded_horizon_required: true
  explicit_invalidation_required: true
  holdout_check_required: true
  confounder_sanity_check_required: true
  detector_spec_fidelity_required: true
  role_and_disposition_compatible: true
seed_promotion:
  allowed_live_usage:
    - live_retrieval
    - overlap_graph
    - monitor_only_shadow
    - operator_review
  blocked_default_usage:
    - production_sizing
    - default_live_sizing
  allowed_deployment_states:
    - monitor_only
    - paper_only
  required_evidence_gaps_field: true
governance_defaults:
  blocked_operational_roles:
    - context
    - filter
    - research_only
    - sequence_component
  blocked_dispositions:
    - context_only
    - research_only
    - repair_before_promotion
    - inactive
    - deprecated
    - alias_only
  preferred_seed_event_ids:
    - VOL_SHOCK
    - LIQUIDITY_VACUUM
    - LIQUIDITY_STRESS_DIRECT
    - BASIS_DISLOC
    - FND_DISLOC
    - LIQUIDATION_CASCADE
    - VOL_SPIKE
  preferred_seed_episode_ids:
    - EP_VOLATILITY_BREAKOUT
    - EP_LIQUIDITY_SHOCK
    - EP_DISLOCATION_REPAIR

testing_score_thresholds:
  reject_max_total: 12
  seed_promote_min_total: 27
  paper_candidate_min_total: 34
  minimum_evidence_strength_for_seed: 3
  minimum_holdout_quality_for_seed: 2
  minimum_confounder_handling_for_seed: 2
