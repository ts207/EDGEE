schema_version: 3
ontology_model: event_state_template

# Lifecycle states for all events:
#   active       - spec + implementation + taxonomy all present; covered by validate_synthetic_detector_truth
#   experimental - implemented but under evaluation; not yet production-qualified
#   deprecated   - removed from active research; retained for audit trail only
#   candidate    - in taxonomy spec but not yet implemented
#
# canonical_events = events where lifecycle == active
# taxonomy_events  = all events listed in families (any lifecycle)
#
# IMPORTANT: Template allow-lists here are retained for ontology/backward compatibility only.
# The authoritative runtime template configuration is spec/templates/event_template_registry.yaml.
# Canonical template verb lexicon lives in spec/hypotheses/template_verb_lexicon.yaml.
# `templates` is the broad family allow-list. `runtime_templates` keeps an optional
# conservative subset for current execution paths.
families:
  LIQUIDITY_DISLOCATION:
    description: "Microstructure imbalance and liquidity withdrawal/recovery dynamics."
    events:
      - event_id: "LIQUIDITY_VACUUM"
        lifecycle: active
      - event_id: "LIQUIDITY_SHOCK"
        lifecycle: active
      - event_id: "DEPTH_COLLAPSE"
        lifecycle: experimental
      - event_id: "SPREAD_BLOWOUT"
        lifecycle: active
      - event_id: "ORDERFLOW_IMBALANCE_SHOCK"
        lifecycle: experimental
      - event_id: "SWEEP_STOPRUN"
        lifecycle: experimental
      - event_id: "ABSORPTION_EVENT"
        lifecycle: deprecated
        deprecation_note: "Superseded by ABSORPTION_PROXY."
      - event_id: "ABSORPTION_PROXY"
        lifecycle: experimental
        maturity: proxy
      - event_id: "DEPTH_STRESS_PROXY"
        lifecycle: experimental
        maturity: proxy
      - event_id: "LIQUIDITY_GAP_PRINT"
        lifecycle: experimental
      - event_id: "LIQUIDITY_STRESS_DIRECT"
        lifecycle: active
      - event_id: "LIQUIDITY_STRESS_PROXY"
        lifecycle: experimental
        maturity: proxy
    states:
      - "LOW_LIQUIDITY_STATE"
      - "REFILL_LAG_STATE"
      - "LIQUIDITY_ABSENCE_STATE"
      - "POST_SWEEP_STATE"
      - "POST_ABSORPTION_STATE"
      - "SPREAD_ELEVATED_STATE"
      - "DEPTH_RECOVERY_STATE"
    templates:
      - "mean_reversion"
      - "stop_run_repair"
      - "overshoot_repair"
      - "continuation"
      - "only_if_liquidity"
      - "slippage_aware_filter"
    runtime_templates:
      - "mean_reversion"
      - "continuation"
      - "stop_run_repair"
      - "overshoot_repair"
      - "only_if_liquidity"
      - "slippage_aware_filter"

  VOLATILITY_TRANSITION:
    description: "Variance regime change and post-shock relaxation/aftershock behavior."
    events:
      - event_id: "VOL_SHOCK"
        lifecycle: active
      - event_id: "VOL_SPIKE"
        lifecycle: active
      - event_id: "VOL_RELAXATION_START"
        lifecycle: active
      - event_id: "VOL_CLUSTER_SHIFT"
        lifecycle: experimental
      - event_id: "RANGE_COMPRESSION_END"
        lifecycle: active
      - event_id: "BREAKOUT_TRIGGER"
        lifecycle: active
    states:
      - "AFTERSHOCK_STATE"
      - "POST_EXPANSION_STATE"
      - "RELAXATION_STATE"
      - "COMPRESSION_STATE"
      - "PRE_BREAKOUT_TENSION_STATE"
      - "HIGH_VOL_REGIME"
      - "LOW_VOL_REGIME"
    templates:
      - "continuation"
      - "trend_continuation"
      - "volatility_expansion_follow"
      - "pullback_entry"
      - "mean_reversion"
      - "only_if_regime"
    runtime_templates:
      - "mean_reversion"
      - "continuation"
      - "trend_continuation"
      - "volatility_expansion_follow"
      - "pullback_entry"
      - "only_if_regime"

  POSITIONING_EXTREMES:
    description: "Carry/leverage crowding, squeeze, and deleveraging dynamics."
    events:
      - event_id: "FUNDING_EXTREME_ONSET"
        lifecycle: active
      - event_id: "FUNDING_FLIP"
        lifecycle: active
      - event_id: "FUNDING_PERSISTENCE_TRIGGER"
        lifecycle: active
      - event_id: "FUNDING_NORMALIZATION_TRIGGER"
        lifecycle: active
      - event_id: "OI_SPIKE_POSITIVE"
        lifecycle: active
      - event_id: "OI_SPIKE_NEGATIVE"
        lifecycle: active
      - event_id: "OI_FLUSH"
        lifecycle: active
      - event_id: "LIQUIDATION_CASCADE"
        lifecycle: active
      - event_id: "DELEVERAGING_WAVE"
        lifecycle: active
      - event_id: "LIQUIDATION_EXHAUSTION_REVERSAL"
        lifecycle: experimental
      - event_id: "POST_DELEVERAGING_REBOUND"
        lifecycle: experimental
    states:
      - "CROWDING_STATE"
      - "FUNDING_PERSISTENCE_STATE"
      - "FUNDING_NORMALIZATION_STATE"
      - "POST_EXTREME_CARRY_STATE"
      - "DELEVERAGING_STATE"
      - "POST_LIQUIDATION_STATE"
      - "SQUEEZE_RISK_STATE"
    templates:
      - "reversal_or_squeeze"
      - "mean_reversion"
      - "continuation"
      - "exhaustion_reversal"
      - "convexity_capture"
      - "only_if_funding"
      - "only_if_oi"
      - "tail_risk_avoid"
    runtime_templates:
      - "reversal_or_squeeze"
      - "mean_reversion"
      - "continuation"
      - "exhaustion_reversal"
      - "convexity_capture"
      - "only_if_funding"
      - "only_if_oi"
      - "tail_risk_avoid"

  FORCED_FLOW_AND_EXHAUSTION:
    description: "Forced directional flows that transition into depletion/exhaustion."
    events:
      - event_id: "FORCED_FLOW_EXHAUSTION"
        lifecycle: active
      - event_id: "TREND_EXHAUSTION_TRIGGER"
        lifecycle: active
      - event_id: "MOMENTUM_DIVERGENCE_TRIGGER"
        lifecycle: active
      - event_id: "CLIMAX_VOLUME_BAR"
        lifecycle: active
      - event_id: "FAILED_CONTINUATION"
        lifecycle: active
      - event_id: "FLOW_EXHAUSTION_PROXY"
        lifecycle: experimental
        maturity: proxy
    states:
      - "POST_FORCED_FLOW_STATE"
      - "EXHAUSTION_STATE"
      - "DISTRIBUTION_ACCUMULATION_STATE"
      - "POST_CLIMAX_STATE"
      - "MEAN_REVERSION_WINDOW_STATE"
    templates:
      - "mean_reversion"
      - "exhaustion_reversal"
      - "momentum_fade"
      - "range_reversion"
      - "only_if_trend"
      - "drawdown_filter"
    runtime_templates:
      - "mean_reversion"
      - "exhaustion_reversal"
      - "momentum_fade"
      - "range_reversion"
      - "only_if_trend"
      - "drawdown_filter"

  TREND_STRUCTURE:
    description: "Range-to-trend transitions and trend-state continuation/failure."
    events:
      - event_id: "RANGE_BREAKOUT"
        lifecycle: active
      - event_id: "FALSE_BREAKOUT"
        lifecycle: active
      - event_id: "TREND_ACCELERATION"
        lifecycle: active
      - event_id: "TREND_DECELERATION"
        lifecycle: active
      - event_id: "PULLBACK_PIVOT"
        lifecycle: active
      - event_id: "SUPPORT_RESISTANCE_BREAK"
        lifecycle: active
    states:
      - "BREAKOUT_HOLD_STATE"
      - "POST_BREAKOUT_RETEST_STATE"
      - "TRENDING_STATE"
      - "CHOP_STATE"
      - "PULLBACK_STATE"
      - "FAILURE_STATE"
    templates:
      - "breakout_followthrough"
      - "false_breakout_reversal"
      - "pullback_entry"
      - "trend_continuation"
      - "continuation"
      - "only_if_trend"
    runtime_templates:
      - "breakout_followthrough"
      - "false_breakout_reversal"
      - "pullback_entry"
      - "trend_continuation"
      - "continuation"
      - "only_if_trend"

  STATISTICAL_DISLOCATION:
    description: "Distributional stretch and overshoot/repair dynamics."
    events:
      - event_id: "ZSCORE_STRETCH"
        lifecycle: active
      - event_id: "BAND_BREAK"
        lifecycle: active
      - event_id: "OVERSHOOT_AFTER_SHOCK"
        lifecycle: active
      - event_id: "GAP_OVERSHOOT"
        lifecycle: active
      - event_id: "BASIS_DISLOC"
        lifecycle: active
      - event_id: "FND_DISLOC"
        lifecycle: active
      - event_id: "COPULA_PAIRS_TRADING"
        lifecycle: experimental
      - event_id: "PRICE_VOL_IMBALANCE_PROXY"
        lifecycle: experimental
        maturity: proxy
    states:
      - "STRETCHED_STATE"
      - "OVERSHOOT_STATE"
      - "REPAIR_WINDOW_STATE"
      - "REVERSION_IN_PROGRESS_STATE"
    templates:
      - "mean_reversion"
      - "overshoot_repair"
      - "tail_risk_avoid"
    runtime_templates:
      - "mean_reversion"
      - "overshoot_repair"
      - "tail_risk_avoid"

  REGIME_TRANSITION:
    description: "Cross-regime transitions that reparameterize strategy behavior."
    events:
      - event_id: "VOL_REGIME_SHIFT_EVENT"
        lifecycle: active
      - event_id: "TREND_TO_CHOP_SHIFT"
        lifecycle: active
      - event_id: "CHOP_TO_TREND_SHIFT"
        lifecycle: active
      - event_id: "CORRELATION_BREAKDOWN_EVENT"
        lifecycle: active
      - event_id: "BETA_SPIKE_EVENT"
        lifecycle: active
    states:
      - "RISK_ON_STATE"
      - "RISK_OFF_STATE"
      - "CORRELATION_BROKEN_STATE"
      - "NEW_REGIME_STABILIZATION_STATE"
      - "TRANSITION_TURBULENCE_STATE"
    templates:
      - "only_if_regime"
      - "continuation"
      - "mean_reversion"
      - "drawdown_filter"
      - "tail_risk_avoid"
    runtime_templates:
      - "only_if_regime"
      - "continuation"
      - "mean_reversion"
      - "drawdown_filter"
      - "tail_risk_avoid"

  INFORMATION_DESYNC:
    description: "Cross-venue/cross-signal information inefficiency and reconciliation."
    events:
      - event_id: "CROSS_VENUE_DESYNC"
        lifecycle: active
      - event_id: "INDEX_COMPONENT_DIVERGENCE"
        lifecycle: active
      - event_id: "SPOT_PERP_BASIS_SHOCK"
        lifecycle: active
      - event_id: "LEAD_LAG_BREAK"
        lifecycle: active
    states:
      - "DESYNC_PERSISTENCE_STATE"
      - "BASIS_ELEVATED_STATE"
      - "CONVERGENCE_WINDOW_STATE"
      - "ARBITRAGE_CROWDING_STATE"
    templates:
      - "desync_repair"
      - "convergence"
      - "basis_repair"
      - "lead_lag_follow"
      - "divergence_continuation"
    runtime_templates:
      - "desync_repair"
      - "convergence"
      - "basis_repair"
      - "lead_lag_follow"
      - "divergence_continuation"

  TEMPORAL_STRUCTURE:
    description: "Session/calendar/funding/news timing effects."
    events:
      - event_id: "SESSION_OPEN_EVENT"
        lifecycle: active
      - event_id: "SESSION_CLOSE_EVENT"
        lifecycle: active
      - event_id: "FUNDING_TIMESTAMP_EVENT"
        lifecycle: active
      - event_id: "SCHEDULED_NEWS_WINDOW_EVENT"
        lifecycle: active
    states:
      - "OPEN_WINDOW_STATE"
      - "CLOSE_WINDOW_STATE"
      - "POST_FUNDING_WINDOW_STATE"
      - "PRE_NEWS_STATE"
      - "POST_NEWS_AFTERSHOCK_STATE"
    templates:
      - "mean_reversion"
      - "volatility_expansion_follow"
      - "only_if_no_news_window"
    runtime_templates:
      - "mean_reversion"
      - "continuation"

  EXECUTION_FRICTION:
    description: "Tradability and cost-environment transitions affecting execution viability."
    events:
      - event_id: "SPREAD_REGIME_WIDENING_EVENT"
        lifecycle: active
      - event_id: "SLIPPAGE_SPIKE_EVENT"
        lifecycle: active
      - event_id: "FEE_REGIME_CHANGE_EVENT"
        lifecycle: active
      - event_id: "WICK_REVERSAL_PROXY"
        lifecycle: experimental
        maturity: proxy
    states:
      - "HIGH_FRICTION_STATE"
      - "LOW_FRICTION_STATE"
      - "ILLIQUID_EXECUTION_STATE"
    templates:
      - "slippage_aware_filter"
      - "tail_risk_avoid"
      - "only_if_liquidity"
    runtime_templates:
      - "slippage_aware_filter"
      - "tail_risk_avoid"

  SEQUENCE_CHAINS:
    description: "Multi-step market narrative sequences: detected via EventSequenceDetector."
    events:
      - event_id: "SEQ_FND_EXTREME_THEN_BREAKOUT"
        lifecycle: experimental
      - event_id: "SEQ_LIQ_VACUUM_THEN_DEPTH_RECOVERY"
        lifecycle: experimental
      - event_id: "SEQ_OI_SPIKEPOS_THEN_VOL_SPIKE"
        lifecycle: experimental
      - event_id: "SEQ_VOL_COMP_THEN_BREAKOUT"
        lifecycle: experimental
    states: []
    templates:
      - "continuation"
      - "mean_reversion"
    runtime_templates:
      - "continuation"
      - "mean_reversion"

