version: 1
kind: search_space
metadata:
  phase: tier1_default
  description: Narrow default search surface for operator-facing discovery.
  search_tier: tier1
  default_symbols:
    - BTCUSDT
    - ETHUSDT
  tier_2_expansion: add one state slice or one filter overlay
  tier_3_expansion: transitions and feature predicates are advanced search surfaces
triggers:
  events:
    - VOL_SHOCK
    - VOL_SPIKE
    - VOL_CLUSTER_SHIFT
    - RANGE_COMPRESSION_END
    - BREAKOUT_TRIGGER
    - LIQUIDITY_VACUUM # [QUALITY: LOW] - Marginal IG (0.000134)
    - SWEEP_STOPRUN
    - DEPTH_COLLAPSE
    - SPREAD_BLOWOUT
    - FUNDING_EXTREME_ONSET
    - FUNDING_FLIP
    - FUNDING_PERSISTENCE_TRIGGER
    - OI_FLUSH
    - LIQUIDATION_CASCADE # [QUALITY: HIGH] - High IG (0.000467)
    - DELEVERAGING_WAVE
    - FORCED_FLOW_EXHAUSTION
    - TREND_EXHAUSTION_TRIGGER
    - MOMENTUM_DIVERGENCE_TRIGGER
    - CLIMAX_VOLUME_BAR
    - ZSCORE_STRETCH
    - BAND_BREAK
    - OVERSHOOT_AFTER_SHOCK # [QUALITY: MODERATE] - Moderate IG (0.000226)
    - GAP_OVERSHOOT
    - FND_DISLOC
    - BASIS_DISLOC
    - RANGE_BREAKOUT
    - FALSE_BREAKOUT
    - TREND_DECELERATION
    - PULLBACK_PIVOT
    - SPOT_PERP_BASIS_SHOCK
    - LEAD_LAG_BREAK
    - CROSS_VENUE_DESYNC
    - SESSION_OPEN_EVENT
    - FUNDING_TIMESTAMP_EVENT
horizons:
  - 12b
  - 24b
  - 48b
directions:
  - long
  - short
entry_lag: 1
cost_profiles:
  - standard
expression_templates:
  - mean_reversion
  - continuation
  - trend_continuation
  - exhaustion_reversal
  - momentum_fade
  - pullback_entry
  - overshoot_repair
filter_templates: []
execution_templates: []
include_sequences: false
include_interactions: false
