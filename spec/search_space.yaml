version: 1
kind: search_space
metadata:
  phase: tier1_default
  description: Narrow default search surface for operator-facing discovery.
  search_tier: tier1
  default_symbols:
    - BTCUSDT
    - ETHUSDT
  tier_2_expansion: add one state slice or one filter overlay
  tier_3_expansion: transitions and feature predicates are advanced search surfaces
triggers:
  events:
    - VOL_SHOCK
    - VOL_SPIKE
    - VOL_CLUSTER_SHIFT
    - RANGE_COMPRESSION_END
    - BREAKOUT_TRIGGER
    - LIQUIDITY_VACUUM # [QUALITY: LOW] - Marginal IG (0.000134)
    - SWEEP_STOPRUN
    - DEPTH_COLLAPSE
    - SPREAD_BLOWOUT
    - FUNDING_EXTREME_ONSET
    - FUNDING_FLIP
    - FUNDING_PERSISTENCE_TRIGGER
    - OI_FLUSH
    - LIQUIDATION_CASCADE # [QUALITY: HIGH] - High IG (0.000467)
    - DELEVERAGING_WAVE
    - FORCED_FLOW_EXHAUSTION
    - TREND_EXHAUSTION_TRIGGER
    - MOMENTUM_DIVERGENCE_TRIGGER
    - CLIMAX_VOLUME_BAR
    - ZSCORE_STRETCH
    - BAND_BREAK
    - OVERSHOOT_AFTER_SHOCK # [QUALITY: MODERATE] - Moderate IG (0.000226)
    - GAP_OVERSHOOT
    - FND_DISLOC
    - BASIS_DISLOC
    - RANGE_BREAKOUT
    - FALSE_BREAKOUT
    - TREND_DECELERATION
    - PULLBACK_PIVOT
    - SPOT_PERP_BASIS_SHOCK
    - LEAD_LAG_BREAK
    - CROSS_VENUE_DESYNC
    - SESSION_OPEN_EVENT
    - FUNDING_TIMESTAMP_EVENT
horizons:
  - 12b
  - 24b
  - 48b
directions:
  - long
  - short
entry_lag: 1
cost_profiles:
  - standard
expression_templates:
  - mean_reversion
  - continuation
  - trend_continuation
  - exhaustion_reversal
  - momentum_fade
  - pullback_entry
  - overshoot_repair
filter_templates: []
execution_templates: []
include_sequences: false
include_interactions: false

# Phase 4 — Hierarchical discovery mode
# Set mode: hierarchical to enable staged candidate refinement.
# Flat mode is the default and is unchanged by this block.
discovery_search:
  mode: flat   # "flat" | "hierarchical"

  trigger_viability:
    enabled: true
    max_templates: 1           # One canonical probe template per trigger
    max_horizons: 1            # First horizon in list only
    max_entry_lags: 1          # First entry lag only
    allow_both_directions: true
    top_k_triggers: null       # null = all viable triggers advance
    min_stage_score: 0.0

  template_refinement:
    enabled: true
    top_k_templates_per_trigger: 3
    min_stage_score: 0.0

  execution_refinement:
    enabled: true
    top_k_shapes_per_template: 3
    min_stage_score: 0.0

  context_refinement:
    enabled: true
    max_context_dims: 1        # Hard cap: no conjunctions in v1
    top_k_contexts_per_candidate: 2
    require_unconditional_baseline: true
    min_context_gain: 0.0      # Context must not hurt baseline score

# Phase 5 — Portfolio-aware discovery selection
# Shortlist is opt-in (enabled: false). Overlap metadata is always computed
# and appended to the full candidate table when mode != "off".
discovery_selection:
  mode: greedy   # "greedy" | "off"

  overlap:
    enabled: true
    structural_weight: 0.5
    fold_weight: 0.3
    lineage_weight: 0.2
    edge_threshold: 0.65   # Minimum similarity to draw an overlap graph edge

  shortlist:
    enabled: false          # Set to true to write phase2_diversified_shortlist.parquet
    size: 20
    lambda_quality: 0.7
    lambda_overlap: 0.2
    lambda_crowding: 0.1
    max_per_overlap_cluster: 2
    max_per_trigger_family: 3
    max_per_lineage: 2
